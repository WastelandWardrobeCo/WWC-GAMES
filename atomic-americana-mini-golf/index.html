<!doctype html>
<html lang="en">
<head>

<title>Atomic Americana Mini Golf</title>
<style>
:root{--bg:#120f1e;--cream:#fff2cf;--pink:#ff5fa2;--cyan:#55e5ff;--yellow:#ffd45c}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;background:radial-gradient(circle at top,#362245 0,#17111f 58%,#0d0a12 100%);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--cream)}body{display:flex;align-items:center;justify-content:center}.app{width:min(100vw,980px);height:100dvh;min-height:100vh;display:flex;flex-direction:column;padding:calc(8px + env(safe-area-inset-top)) calc(8px + env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) calc(8px + env(safe-area-inset-left));gap:8px}.topbar{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;background:rgba(28,20,42,.92);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:10px 14px;box-shadow:0 10px 30px rgba(0,0,0,.3)}.brand h1{margin:0;font-size:clamp(19px,4vw,30px);letter-spacing:-.8px}.brand small{color:#cbbbdc}.stat{min-width:88px;text-align:center;background:#17101f;border-radius:14px;padding:7px 10px}.stat b{display:block;font-size:21px;color:var(--yellow)}.stage{flex:1;position:relative;overflow:hidden;border-radius:24px;border:2px solid rgba(255,255,255,.12);box-shadow:0 18px 50px rgba(0,0,0,.4);background:linear-gradient(#301a48 0 48%,#53335a 48% 53%,#1b4639 53%);touch-action:none}.sky{position:absolute;inset:0 0 47% 0;background:radial-gradient(circle at 80% 18%,rgba(255,236,133,.95) 0 3%,transparent 3.5%),linear-gradient(#26173f 0,#5d2d62 68%,#ef7a75 100%)}.stars{position:absolute;inset:0;background-image:radial-gradient(circle,#fff 1px,transparent 1px),radial-gradient(circle,#fff 1px,transparent 1px);background-size:70px 70px,110px 110px;background-position:0 0,25px 15px;opacity:.7}.mountains{position:absolute;left:-5%;right:-5%;bottom:47%;height:120px;background:#2d1a3c;clip-path:polygon(0 100%,12% 52%,22% 83%,34% 30%,46% 78%,60% 34%,70% 77%,82% 45%,100% 100%)}.sign{position:absolute;left:6%;top:8%;width:165px;padding:13px 10px 10px;border:5px solid #2e2437;border-radius:20px;background:#f8dd91;color:#3d1f3b;text-align:center;font-weight:1000;transform:rotate(-3deg);box-shadow:0 0 18px var(--pink),0 0 36px rgba(255,95,162,.45)}.sign .tiny{font-size:11px;letter-spacing:2px}.sign .big{font-size:22px;color:#c12f75;text-transform:uppercase}.ufo{position:absolute;right:8%;top:15%;font-size:54px;filter:drop-shadow(0 0 12px var(--cyan));animation:float 3s ease-in-out infinite}@keyframes float{50%{transform:translateY(-8px) rotate(2deg)}}.courseWrap{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center;padding:8px}canvas{width:100%;height:100%;display:block}.hud{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);width:min(92%,600px);display:flex;justify-content:space-between;align-items:center;gap:10px;pointer-events:none}.tip,.message{background:rgba(19,13,26,.85);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:9px 13px;font-size:13px;backdrop-filter:blur(6px)}.message{color:var(--yellow);font-weight:800}.controls{display:flex;gap:8px}button{border:0;border-radius:14px;padding:12px 15px;font-weight:900;cursor:pointer;color:#241528;background:var(--yellow);box-shadow:0 5px 0 #8e6132}button:active{transform:translateY(3px);box-shadow:0 2px 0 #8e6132}button.secondary{background:#c8bde2;box-shadow:0 5px 0 #6e5f88}.overlay{position:absolute;inset:0;background:rgba(10,8,14,.72);display:none;place-items:center;padding:20px;z-index:5}.overlay.show{display:grid}.card{width:min(470px,92vw);background:#fff1cf;color:#35213c;border-radius:26px;padding:24px;text-align:center;box-shadow:0 22px 60px rgba(0,0,0,.45)}.card h2{font-size:34px;margin:0 0 6px}.card p{line-height:1.5}.card button{width:100%}.rotateHint{display:none;position:absolute;inset:0;z-index:20;background:#120f1e;color:#fff2cf;place-items:center;text-align:center;padding:28px}.rotateHint .phone{font-size:54px;display:block;margin-bottom:10px;animation:turnPhone 1.8s ease-in-out infinite}@keyframes turnPhone{50%{transform:rotate(90deg)}}@media (orientation:portrait) and (max-width:620px){.rotateHint{display:grid}}@media(max-width:620px){.app{padding:calc(5px + env(safe-area-inset-top)) calc(5px + env(safe-area-inset-right)) calc(5px + env(safe-area-inset-bottom)) calc(5px + env(safe-area-inset-left))}.topbar{grid-template-columns:1fr auto auto;padding:8px 10px}.brand small{display:none}.stat{min-width:64px;padding:6px}.stat b{font-size:18px}.sign{width:130px;transform:scale(.84) rotate(-3deg);transform-origin:top left}.ufo{font-size:42px}.hud{bottom:8px}.tip{display:none}}
</style>
</head>
<body>
<div class="app"><div class="topbar"><div class="brand"><h1>Atomic Americana Mini Golf</h1><small>Hole 1: The Neon Diner</small></div><div class="stat">STROKES<b id="strokes">0</b></div><div class="stat">PAR<b>3</b></div></div><div class="stage" id="stage"><div class="rotateHint"><div><span class="phone">📱</span><strong>Rotate your phone sideways</strong><br><small>Atomic Americana is wider than the interstate.</small></div></div><div class="sky"><div class="stars"></div></div><div class="mountains"></div><div class="sign"><div class="tiny">WELCOME TO</div><div class="big">Neon Diner</div><div class="tiny">HOT PIE • COLD ATOMS</div></div><div class="ufo">🛸</div><div class="courseWrap"><canvas id="game"></canvas></div><div class="hud"><div class="tip">Drag backward from the ball, then release.</div><div class="message" id="message">Aim for the glowing cup.</div></div><div class="overlay" id="winOverlay"><div class="card"><h2>Hole Complete!</h2><p id="winText"></p><button id="playAgain">Play Again</button></div></div></div><div class="controls"><button class="secondary" id="resetBall">Reset Ball</button><button id="newRound">New Round</button></div></div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),strokesEl=document.getElementById('strokes'),messageEl=document.getElementById('message'),overlay=document.getElementById('winOverlay'),winText=document.getElementById('winText');let W=900,H=620,dpr=1,strokes=0,dragging=false,won=false,last=performance.now(),currentPointer={x:180,y:500};const ball={x:180,y:500,r:12,vx:0,vy:0,startX:180,startY:500},hole={x:755,y:165,r:16},walls=[{x:90,y:390,w:520,h:26,kind:'wall'},{x:590,y:235,w:28,h:181,kind:'wall'},{x:610,y:235,w:185,h:26,kind:'wall'},{x:768,y:165,w:27,h:96,kind:'wall'},{x:270,y:465,w:180,h:28,kind:'bumper'},{x:470,y:330,w:90,h:24,kind:'bumper'}],diner={x:625,y:280,w:130,h:85};function resize(){const r=canvas.getBoundingClientRect();dpr=Math.min(devicePixelRatio||1,2);canvas.width=Math.round(r.width*dpr);canvas.height=Math.round(r.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);W=r.width;H=r.height}addEventListener('resize',resize);const sx=v=>v*(W/900),sy=v=>v*(H/620),speed=()=>Math.hypot(ball.vx,ball.vy);function resetBall(){ball.x=ball.startX;ball.y=ball.startY;ball.vx=ball.vy=0;won=false;messageEl.textContent='Aim for the glowing cup.'}function newRound(){strokes=0;strokesEl.textContent=0;overlay.classList.remove('show');resetBall()}function pointerPos(e){const r=canvas.getBoundingClientRect(),p=e.touches?e.touches[0]:(e.changedTouches?e.changedTouches[0]:e);return{x:(p.clientX-r.left)/(r.width/900),y:(p.clientY-r.top)/(r.height/620)}}function down(e){if(speed()>=8||won)return;const p=pointerPos(e);currentPointer=p;if(Math.hypot(p.x-ball.x,p.y-ball.y)<52){dragging=true;e.preventDefault()}}function move(e){if(!dragging)return;currentPointer=pointerPos(e);e.preventDefault()}function up(e){if(!dragging)return;dragging=false;const p=pointerPos(e),dx=ball.x-p.x,dy=ball.y-p.y,mag=Math.min(150,Math.hypot(dx,dy));if(mag<8)return;const power=mag*3.9,len=Math.hypot(dx,dy)||1;ball.vx=dx/len*power;ball.vy=dy/len*power;strokes++;strokesEl.textContent=strokes;messageEl.textContent='Ball in motion...';e.preventDefault()}canvas.addEventListener('pointerdown',e=>{currentPointer=pointerPos(e);down(e);canvas.setPointerCapture?.(e.pointerId)});canvas.addEventListener('pointermove',e=>{currentPointer=pointerPos(e);move(e)});canvas.addEventListener('pointerup',e=>{currentPointer=pointerPos(e);up(e)});canvas.addEventListener('pointercancel',()=>{dragging=false});canvas.addEventListener('contextmenu',e=>e.preventDefault());function collideRect(r){const nx=Math.max(r.x,Math.min(ball.x,r.x+r.w)),ny=Math.max(r.y,Math.min(ball.y,r.y+r.h)),dx=ball.x-nx,dy=ball.y-ny,dist=Math.hypot(dx,dy);if(dist<ball.r){const overlap=ball.r-dist,ux=dist?dx/dist:0,uy=dist?dy/dist:-1;ball.x+=ux*overlap;ball.y+=uy*overlap;const dot=ball.vx*ux+ball.vy*uy;ball.vx-=1.72*dot*ux;ball.vy-=1.72*dot*uy;if(r.kind==='bumper'){ball.vx*=1.08;ball.vy*=1.08}}}function physics(dt){if(won)return;ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;const f=Math.pow(.986,dt*60);ball.vx*=f;ball.vy*=f;if(speed()<3){ball.vx=ball.vy=0;if(strokes>0)messageEl.textContent='Ready for the next shot.'}if(ball.x-ball.r<70){ball.x=70+ball.r;ball.vx=Math.abs(ball.vx)*.82}if(ball.x+ball.r>830){ball.x=830-ball.r;ball.vx=-Math.abs(ball.vx)*.82}if(ball.y-ball.r<115){ball.y=115+ball.r;ball.vy=Math.abs(ball.vy)*.82}if(ball.y+ball.r>565){ball.y=565-ball.r;ball.vy=-Math.abs(ball.vy)*.82}walls.forEach(collideRect);if(Math.hypot(ball.x-hole.x,ball.y-hole.y)<hole.r&&speed()<85){won=true;ball.x=hole.x;ball.y=hole.y;ball.vx=ball.vy=0;winText.textContent=strokes===1?'A hole-in-one. The diner erupts in applause from nobody.':strokes<=3?'Under the neon and right on par.':`You finished in ${strokes} strokes. The pie is still warm.`;setTimeout(()=>overlay.classList.add('show'),500)}}function roundRect(x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.roundRect(sx(x),sy(y),sx(w),sy(h),sx(r));if(fill){ctx.fillStyle=fill;ctx.fill()}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke()}}function drawCourse(){ctx.clearRect(0,0,W,H);roundRect(65,105,770,465,34,'rgba(0,0,0,.35)');roundRect(70,110,760,450,30,'#1d7b57','#9fffc7');ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=3;ctx.strokeRect(sx(90),sy(130),sx(720),sy(410));roundRect(diner.x,diner.y,diner.w,diner.h,12,'#f3c76f','#3f2449');roundRect(diner.x+8,diner.y+12,114,30,7,'#ff77ad');ctx.fillStyle='#2b1740';ctx.font=`${sx(17)}px system-ui`;ctx.textAlign='center';ctx.fillText('ATOM DINER',sx(diner.x+65),sy(diner.y+34));for(let i=0;i<3;i++)roundRect(diner.x+15+i*36,diner.y+53,24,20,4,'#79e8ff','#2d2340');walls.forEach(r=>roundRect(r.x,r.y,r.w,r.h,8,r.kind==='bumper'?'#ff5fa2':'#f0d184',r.kind==='bumper'?'#ffd4e5':'#4b2c54'));const g=ctx.createRadialGradient(sx(hole.x),sy(hole.y),1,sx(hole.x),sy(hole.y),sx(35));g.addColorStop(0,'rgba(85,229,255,.85)');g.addColorStop(1,'rgba(85,229,255,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx(hole.x),sy(hole.y),sx(35),0,Math.PI*2);ctx.fill();ctx.fillStyle='#081016';ctx.beginPath();ctx.arc(sx(hole.x),sy(hole.y),sx(hole.r),0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff7df';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(sx(hole.x),sy(hole.y));ctx.lineTo(sx(hole.x),sy(hole.y-74));ctx.stroke();ctx.fillStyle='#ff5fa2';ctx.beginPath();ctx.moveTo(sx(hole.x),sy(hole.y-74));ctx.lineTo(sx(hole.x+48),sy(hole.y-60));ctx.lineTo(sx(hole.x),sy(hole.y-47));ctx.closePath();ctx.fill()}function drawBall(){if(dragging){const dx=ball.x-currentPointer.x,dy=ball.y-currentPointer.y,mag=Math.min(150,Math.hypot(dx,dy)),len=Math.hypot(dx,dy)||1,tx=ball.x+dx/len*mag*1.25,ty=ball.y+dy/len*mag*1.25;ctx.setLineDash([8,8]);ctx.strokeStyle='#fff7b0';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(sx(ball.x),sy(ball.y));ctx.lineTo(sx(tx),sy(ty));ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='rgba(255,212,92,.18)';ctx.beginPath();ctx.arc(sx(ball.x),sy(ball.y),sx(30+mag*.18),0,Math.PI*2);ctx.fill()}ctx.shadowColor='#fff';ctx.shadowBlur=12;ctx.fillStyle='#fffef7';ctx.beginPath();ctx.arc(sx(ball.x),sy(ball.y),sx(ball.r),0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}function frame(now){const dt=Math.min(.033,(now-last)/1000);last=now;physics(dt);drawCourse();drawBall();requestAnimationFrame(frame)}document.getElementById('resetBall').onclick=resetBall;document.getElementById('newRound').onclick=newRound;document.getElementById('playAgain').onclick=newRound;resize();requestAnimationFrame(frame);
</script>
</body>
</html>
