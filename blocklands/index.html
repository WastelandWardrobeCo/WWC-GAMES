<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#13202b"><title>Blocklands</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#79b9da;color:#fff;font-family:system-ui,-apple-system,sans-serif;touch-action:none;user-select:none}canvas{display:block;width:100%;height:100%}#ui{position:fixed;inset:0;pointer-events:none;padding:calc(8px + env(safe-area-inset-top)) calc(8px + env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) calc(8px + env(safe-area-inset-left))}.card{background:#0c1723d9;border:1px solid #ffffff22;border-radius:14px;padding:8px 10px;box-shadow:0 8px 24px #0006}.top{display:flex;justify-content:space-between}.title{font-weight:900}.small{font-size:11px;color:#d7e5ee}#cross{position:absolute;left:50%;top:50%;width:20px;height:20px;transform:translate(-50%,-50%)}#cross:before,#cross:after{content:"";position:absolute;background:#fff;box-shadow:0 0 3px #000}#cross:before{width:18px;height:2px;top:9px;left:1px}#cross:after{height:18px;width:2px;left:9px;top:1px}#bar{position:absolute;left:50%;bottom:calc(12px + env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;gap:6px;pointer-events:auto}.slot{width:49px;height:49px;border:2px solid #ffffff88;border-radius:11px;background:#09121ddd;display:grid;place-items:center;font-size:23px}.slot.on{border-color:#ffd166;transform:translateY(-4px)}#mobile{display:none}.stick{position:absolute;bottom:82px;width:128px;height:128px;border-radius:50%;background:#ffffff15;border:1px solid #ffffff2e;pointer-events:auto}.stick.left{left:14px}.stick.right{right:14px}.knob{position:absolute;left:50%;top:50%;width:54px;height:54px;border-radius:50%;transform:translate(-50%,-50%);background:#ffffff35;border:2px solid #ffffff55}.actions{position:absolute;right:18px;bottom:225px;display:grid;grid-template-columns:58px 58px;gap:8px;pointer-events:auto}.actions button{width:58px;height:58px;border:0;border-radius:50%;background:#0c1723dd;color:#fff;font-weight:900;font-size:10px}.toast{position:absolute;left:50%;top:78px;transform:translateX(-50%);background:#0c1723ed;border-radius:999px;padding:8px 12px;opacity:0;transition:.2s}.toast.show{opacity:1}#boot{position:fixed;inset:0;z-index:20;display:grid;place-items:center;padding:20px;background:linear-gradient(#13202b99,#09121ddd)}.box{width:min(470px,92vw);background:#f6ecd1;color:#192832;border-radius:25px;padding:25px;text-align:center;box-shadow:0 24px 70px #0008}.box h1{margin:0;font-size:38px}.box p{line-height:1.45}.box button{width:100%;border:0;border-radius:15px;padding:15px;background:#2c7a5b;color:#fff;font-weight:900;font-size:17px}.box button:disabled{opacity:.65}.status{min-height:22px;margin-top:10px;font-size:13px;font-weight:700;color:#52616b}@media(max-width:760px){#mobile{display:block}.desktop{display:none}.title{font-size:13px}.small{font-size:9px}.slot{width:43px;height:43px;font-size:20px}}
</style></head><body>
<div id="boot"><div class="box"><h1>Blocklands</h1><p>A tiny voxel sandbox. Walk the island, mine cubes, and build something questionable.</p><button id="start">Enter Blocklands</button><div class="status" id="status">Ready</div></div></div>
<div id="ui"><div class="top"><div class="card"><div class="title">BLOCKLANDS PROTOTYPE</div><div class="small">Mine it. Place it. Sheep pending.</div></div><div class="card small"><div id="coords">X 0 · Y 0 · Z 0</div><div id="selname">Selected: Grass</div></div></div><div id="cross"></div><div id="toast" class="toast"></div><div class="card small desktop" style="position:absolute;left:10px;bottom:78px">Click view · WASD · Space · Left mine · Right place · 1–4 blocks</div><div id="bar"><div class="slot on" data-t="grass">🌿</div><div class="slot" data-t="dirt">🟫</div><div class="slot" data-t="stone">🪨</div><div class="slot" data-t="wood">🪵</div></div><div id="mobile"><div class="stick left" id="move"><div class="knob"></div></div><div class="stick right" id="look"><div class="knob"></div></div><div class="actions"><button id="jump">JUMP</button><button id="mine">MINE</button><button id="place">PLACE</button><button id="reset">RESET</button></div></div></div>
<script>
const boot=document.getElementById('boot'),start=document.getElementById('start'),statusEl=document.getElementById('status');let started=false;
function loadScript(url){return new Promise((ok,no)=>{const s=document.createElement('script');s.src=url;s.onload=ok;s.onerror=no;document.head.appendChild(s)})}
async function getThree(){if(window.THREE)return;try{statusEl.textContent='Loading 3D engine…';await loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js')}catch(e){statusEl.textContent='Trying backup server…';await loadScript('https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js')}if(!window.THREE)throw Error('3D engine unavailable')}
start.addEventListener('pointerup',async e=>{e.preventDefault();if(started)return;start.disabled=true;try{await getThree();started=true;boot.style.display='none';init()}catch(err){start.disabled=false;start.textContent='Try Again';statusEl.textContent='Could not load the 3D engine. Check connection or disable content blocking.'}});
function init(){
const T=THREE,scene=new T.Scene();scene.background=new T.Color(0x79b9da);scene.fog=new T.Fog(0x79b9da,17,45);const cam=new T.PerspectiveCamera(70,innerWidth/innerHeight,.1,90),ren=new T.WebGLRenderer({antialias:true});ren.setPixelRatio(Math.min(devicePixelRatio,1.7));ren.setSize(innerWidth,innerHeight);document.body.prepend(ren.domElement);scene.add(new T.HemisphereLight(0xd9f2ff,0x535d3d,1.7));const sun=new T.DirectionalLight(0xffefbd,1.6);sun.position.set(12,22,8);scene.add(sun);
const world=new Map(),meshes=[],g=new T.BoxGeometry(1,1,1),m={grass:new T.MeshLambertMaterial({color:0x72aa49}),dirt:new T.MeshLambertMaterial({color:0x895a35}),stone:new T.MeshLambertMaterial({color:0x83888c}),wood:new T.MeshLambertMaterial({color:0x96663a}),sand:new T.MeshLambertMaterial({color:0xd7c88f}),leaves:new T.MeshLambertMaterial({color:0x4d8842})};const K=(x,y,z)=>x+','+y+','+z;
function add(x,y,z,t='grass'){if(world.has(K(x,y,z)))return;const q=new T.Mesh(g,m[t]||m.grass);q.position.set(x,y,z);q.userData={x,y,z,t};scene.add(q);world.set(K(x,y,z),q);meshes.push(q)}
function rem(q){if(!q||q.userData.y<=-2)return;scene.remove(q);world.delete(K(q.userData.x,q.userData.y,q.userData.z));meshes.splice(meshes.indexOf(q),1)}
const H=(x,z)=>Math.floor(1.5*Math.sin(x*.35)+1.1*Math.cos(z*.3)-Math.hypot(x,z)*.055);for(let x=-12;x<=12;x++)for(let z=-12;z<=12;z++){if(Math.hypot(x,z)>15)continue;let h=H(x,z);for(let y=-3;y<=h;y++)add(x,y,z,y===h?(h<0?'sand':'grass'):(y>h-3?'dirt':'stone'))}
function tree(x,z){let y=H(x,z)+1;for(let i=0;i<4;i++)add(x,y+i,z,'wood');for(let a=-2;a<=2;a++)for(let b=-2;b<=2;b++)for(let c=2;c<=4;c++)if(Math.abs(a)+Math.abs(b)<4)add(x+a,y+c,z+b,'leaves')}tree(-5,-3);tree(6,4);
const water=new T.Mesh(new T.PlaneGeometry(42,42),new T.MeshPhongMaterial({color:0x3e91bd,transparent:true,opacity:.7}));water.rotation.x=-Math.PI/2;water.position.y=-1.48;scene.add(water);
const p={pos:new T.Vector3(0,5,8),vel:new T.Vector3(),yaw:0,pitch:-.15,on:false,h:1.65,r:.3};cam.position.copy(p.pos);const keys={},ray=new T.Raycaster();ray.far=6;let hit=null,sel='grass',locked=false,move={x:0,y:0};const out=new T.LineSegments(new T.EdgesGeometry(new T.BoxGeometry(1.03,1.03,1.03)),new T.LineBasicMaterial({color:0xffef64}));scene.add(out);out.visible=false;
const toast=document.getElementById('toast');let tt;function say(s){toast.textContent=s;toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('show'),1000)}
function choose(t){sel=t;document.querySelectorAll('.slot').forEach(s=>s.classList.toggle('on',s.dataset.t===t));document.getElementById('selname').textContent='Selected: '+t[0].toUpperCase()+t.slice(1)}
document.querySelectorAll('.slot').forEach(s=>s.onclick=()=>choose(s.dataset.t));onkeydown=e=>{keys[e.code]=1;if(/^Digit[1-4]$/.test(e.code))choose(['grass','dirt','stone','wood'][+e.code.at(-1)-1])};onkeyup=e=>keys[e.code]=0;
function collision(v){for(let x=Math.floor(v.x-p.r);x<=Math.floor(v.x+p.r);x++)for(let y=Math.floor(v.y-p.h);y<=Math.floor(v.y-.05);y++)for(let z=Math.floor(v.z-p.r);z<=Math.floor(v.z+p.r);z++)if(world.has(K(x,y,z)))return 1}
function axis(a,d){let v=p.pos.clone();v[a]+=d;if(!collision(v))p.pos.copy(v);else p.vel[a]=0}
function mine(){if(hit){rem(hit.object);say('Block mined')}}function place(){if(!hit)return;let v=hit.object.position.clone().add(hit.face.normal);v.set(Math.round(v.x),Math.round(v.y),Math.round(v.z));if(!world.has(K(v.x,v.y,v.z)))add(v.x,v.y,v.z,sel)}
ren.domElement.onclick=()=>{if(innerWidth>760&&!locked)ren.domElement.requestPointerLock?.()};document.onpointerlockchange=()=>locked=document.pointerLockElement===ren.domElement;onmousemove=e=>{if(locked){p.yaw-=e.movementX*.0025;p.pitch=Math.max(-1.45,Math.min(1.45,p.pitch-e.movementY*.0025))}};ren.domElement.onmousedown=e=>{if(locked)(e.button?place:mine)()};ren.domElement.oncontextmenu=e=>e.preventDefault();
function stick(id,cb){const z=document.getElementById(id),n=z.firstElementChild;let pid,cx,cy;z.onpointerdown=e=>{pid=e.pointerId;z.setPointerCapture(pid);let r=z.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2};z.onpointermove=e=>{if(e.pointerId!==pid)return;let x=e.clientX-cx,y=e.clientY-cy,d=Math.hypot(x,y),mx=38;if(d>mx){x=x/d*mx;y=y/d*mx}n.style.transform=`translate(calc(-50% + ${x}px),calc(-50% + ${y}px))`;cb(x/mx,y/mx)};z.onpointerup=z.onpointercancel=e=>{if(e.pointerId===pid){pid=null;n.style.transform='translate(-50%,-50%)';cb(0,0)}}}
stick('move',(x,y)=>move={x,y});let lx=0,ly=0,lp;const look=document.getElementById('look');look.onpointerdown=e=>{lp=e.pointerId;lx=e.clientX;ly=e.clientY;look.setPointerCapture(lp)};look.onpointermove=e=>{if(e.pointerId!==lp)return;p.yaw-=(e.clientX-lx)*.009;p.pitch=Math.max(-1.45,Math.min(1.45,p.pitch-(e.clientY-ly)*.009));lx=e.clientX;ly=e.clientY};look.onpointerup=look.onpointercancel=()=>lp=null;
document.getElementById('jump').onclick=()=>{if(p.on)p.vel.y=6};document.getElementById('mine').onclick=mine;document.getElementById('place').onclick=place;document.getElementById('reset').onclick=()=>{p.pos.set(0,5,8);p.vel.set(0,0,0)};
let last=performance.now();function loop(now){let dt=Math.min(.035,(now-last)/1000);last=now;let f=new T.Vector3(-Math.sin(p.yaw),0,-Math.cos(p.yaw)),r=new T.Vector3(Math.cos(p.yaw),0,-Math.sin(p.yaw)),ix=(keys.KeyD?1:0)-(keys.KeyA?1:0)+move.x,iz=(keys.KeyW?1:0)-(keys.KeyS?1:0)-move.y,l=Math.hypot(ix,iz);if(l>1){ix/=l;iz/=l}let w=r.multiplyScalar(ix).add(f.multiplyScalar(iz));p.vel.x+=w.x*(p.on?26:9)*dt;p.vel.z+=w.z*(p.on?26:9)*dt;let drag=Math.pow(p.on?.001:.08,dt);p.vel.x*=drag;p.vel.z*=drag;if(keys.Space&&p.on){p.vel.y=6;p.on=false}p.vel.y-=16*dt;axis('x',p.vel.x*dt);axis('z',p.vel.z*dt);p.on=false;let by=p.pos.y;axis('y',p.vel.y*dt);if(p.pos.y===by&&p.vel.y<=0)p.on=true;if(p.pos.y<-8){p.pos.set(0,5,8);p.vel.set(0,0,0)}cam.position.copy(p.pos);cam.rotation.order='YXZ';cam.rotation.y=p.yaw;cam.rotation.x=p.pitch;ray.setFromCamera(new T.Vector2(),cam);hit=ray.intersectObjects(meshes,false)[0]||null;out.visible=!!hit;if(hit)out.position.copy(hit.object.position);document.getElementById('coords').textContent=`X ${p.pos.x.toFixed(1)} · Y ${p.pos.y.toFixed(1)} · Z ${p.pos.z.toFixed(1)}`;ren.render(scene,cam);requestAnimationFrame(loop)}requestAnimationFrame(loop);onresize=()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight)}
}
</script></body></html>
