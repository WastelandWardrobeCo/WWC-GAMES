<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lady & Delilah™: The Hunt</title>
  <style>
    :root{color-scheme:dark;--bg:#050708;--panel:#0c1113;--line:#2f3c3d;--text:#f1ecdf;--muted:#98a39f;--green:#72e5a4;--gold:#d4b46a}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Inter,"Segoe UI",Arial,sans-serif;overflow:hidden}
    body{display:grid;grid-template-rows:auto 1fr}
    .workspace{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:9px clamp(12px,3vw,32px);border-bottom:1px solid var(--line);background:linear-gradient(90deg,rgba(114,229,164,.055),transparent 35%),rgba(5,8,9,.98);box-shadow:0 10px 30px #0008;z-index:10}
    .brand strong,.brand span{display:block}.brand strong{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--green)}.brand span{margin-top:3px;font-size:.72rem;color:var(--muted)}
    nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    nav a{display:inline-flex;align-items:center;justify-content:center;min-height:35px;padding:8px 12px;border:1px solid transparent;border-radius:7px;color:#bcc6c1;text-decoration:none;font-size:.77rem;white-space:nowrap}
    nav a:hover,nav a:focus-visible{color:white;border-color:var(--line);background:#ffffff08;outline:none}
    nav a.active{color:#c9f7d9;border-color:#72e5a466;background:#72e5a41c;box-shadow:inset 0 -2px var(--green)}
    iframe{width:100%;height:100%;border:0;background:#000}
    @media(max-width:720px){body{grid-template-rows:auto 1fr}.workspace{align-items:flex-start;flex-direction:column;gap:8px}.brand span{display:none}nav{width:100%;justify-content:flex-start}nav a{flex:1 1 calc(50% - 6px);padding-inline:7px}}
  </style>
</head>
<body>
  <header class="workspace">
    <div class="brand"><strong>Systema Obscura</strong><span>Lady & Delilah™ Game Workspace</span></div>
    <nav aria-label="Game workspaces">
      <a class="active" href="hunt.html">Hunt Board</a>
      <a href="../tools/game-studio.html">Card Studio</a>
      <a href="../forge.html">Jonas’ Forge</a>
      <a href="../tools/index.html">Trading Cards</a>
      <a href="../index.html">WWC Games</a>
    </nav>
  </header>
  <iframe src="index.html" title="Lady and Delilah Hunt Board" allow="fullscreen"></iframe>
</body>
</html>
